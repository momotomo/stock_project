# settings.local.yml の作成例
# このファイルはテンプレートです。必要な値を settings.local.yml にコピーして使ってください。

IS_PRODUCTION: false
API_PASSWORD_SIM: "YOUR_SIM_API_PASSWORD"
API_PASSWORD_PROD: "YOUR_PROD_API_PASSWORD"
TRADE_PASSWORD: "YOUR_TRADE_PASSWORD"
EXCHANGE: 9
TRADE_STYLE: "day"
TARGET_HORIZON: "短期"
TRADE_MODE: "CASH"
ACCOUNT_TYPE: 4
MAX_POSITIONS: 1
LOT_CALC_MODE: "FIXED"
FIXED_LOT_SIZE: 100
AUTO_INVEST_RATIO: 0.3
ENTRY_THRESHOLD_PROB: 50.1
TAKE_PROFIT_PCT: 0.05
STOP_LOSS_PCT: 0.05
ATR_K1: 2.0
ATR_K2: 3.0
BREAKER_ENABLED: true
BREAKER_TICKER: "1306.T"
BREAKER_RET_THRESHOLD: -0.015
BREAKER_MA_DAYS: 5
HEALTH_LOG_PATH: "daily_health_log.csv"
RECO_CSV_PATH: "recommendations.csv"
