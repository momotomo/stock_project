name: Daily Stock Prediction Batch

on:
  schedule:
    # 日本時間の平日(月〜金) 16:30 に実行 (UTCでは 7:30)
    - cron: '30 7 * * 1-5'
  workflow_dispatch: # 手動でボタンを押して実行できるようにする設定

jobs:
  run-prediction:
    runs-on: ubuntu-latest
    permissions:
      contents: write # CSVファイルをリポジトリに上書き保存する権限

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10' # クラウド環境は安定版の3.10を使用

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run daily batch script
        run: python daily_batch.py

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add prediction_history.csv recommendations.csv
          # 変更がある場合のみコミットしてプッシュする
          git commit -m "Automated daily prediction log" || echo "No changes to commit"
          git push