# ==========================================
# 自動取引システム 設定テンプレート (Git管理用)
# ==========================================
#
# 秘密情報は settings.local.yml に置いてください。
# 同じキーが両方にある場合は settings.local.yml が優先されます。

# --- 環境・認証設定 ---
IS_PRODUCTION: false
API_PASSWORD_SIM: "YOUR_SIM_API_PASSWORD"
API_PASSWORD_PROD: "YOUR_PROD_API_PASSWORD"
TRADE_PASSWORD: "YOUR_TRADE_PASSWORD"

# --- 取引設定 ---
EXCHANGE: 9
TRADE_STYLE: "day"
TARGET_HORIZON: "短期"
TRADE_MODE: "CASH"
ACCOUNT_TYPE: 4
MAX_POSITIONS: 1
LOT_CALC_MODE: "FIXED"
FIXED_LOT_SIZE: 100
AUTO_INVEST_RATIO: 0.3
ENTRY_THRESHOLD_PROB: 50.1
TAKE_PROFIT_PCT: 0.05
STOP_LOSS_PCT: 0.05
ATR_K1: 2.0
ATR_K2: 3.0

# --- daily_batch ブレーカー設定 ---
BREAKER_ENABLED: true
BREAKER_TICKER: "1306.T"
BREAKER_RET_THRESHOLD: -0.015
BREAKER_MA_DAYS: 5
HEALTH_LOG_PATH: "runtime/health/daily_health_log.csv"
RECO_CSV_PATH: "runtime/signals/recommendations.csv"
