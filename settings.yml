# ==========================================
# 自動取引エンジン 設定ファイル (settings.yml)
# ==========================================

# --- 環境・認証設定 ---
# 本番環境モード。falseでシミュレーター(ポート18081)、trueで本番(ポート18080)に接続します
IS_PRODUCTION: false

# kabuステーションのAPI接続パスワード（検証環境を使う場合は検証用のもの）
API_PASSWORD: "1111111111"

# 注文・決済時に使用する取引パスワード（証券口座のもの）
TRADE_PASSWORD: "YOUR_TRADE_PASSWORD"

# 取引所コード。9は「SOR」を意味します
EXCHANGE: 9

# --- 取引スタイル・指標設定 (🔥NEW) ---
# トレードスタイル。「day」でデイトレード(14:50強制決済)、「swing」で持ち越し
TRADE_STYLE: "day"

# エントリーの基準にするAI予測の期間
# 「明日」, 「1W」, 「2W」, 「1M」, 「3M」, 「6M」, 「1Y」から選択
TARGET_HORIZON: "明日"

# --- 取引・ロット設定 ---
# 取引モード。「CASH」で現物取引、「MARGIN」で信用取引（制度信用）を行います
TRADE_MODE: "CASH"

# 🔥 NEW: 預り区分。「21」特定口座、「11」一般口座、「02」NISA
FUND_TYPE: "21"

# システムが同時に保有する最大銘柄数
MAX_POSITIONS: 1

# ロット数の計算モード。「FIXED」で固定株数、「AUTO」で口座残高から自動計算します
LOT_CALC_MODE: "AUTO"

# 「FIXED」モード時の1回のエントリーで購入する株数（例：100なら1単元）
FIXED_LOT_SIZE: 100

# 「AUTO」モード時、口座の買付余力（残高）に対する最大投資割合（例: 0.3 = 余力の30%を上限とする）
AUTO_INVEST_RATIO: 0.3

# --- ロジック・バリア設定 ---
# 買いシグナルを発火する上昇確率のしきい値(%)
ENTRY_THRESHOLD_PROB: 50.1

# 利確（テイクプロフィット）のライン。0.05は取得単価の「+5%」で自動決済します
TAKE_PROFIT_PCT: 0.05

# 損切（ストップロス）のライン。0.05は取得単価の「-5%」で自動決済します
STOP_LOSS_PCT: 0.05